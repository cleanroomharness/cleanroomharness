apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  labels:
    app.kubernetes.io/part-of: cleanroom-harness
  # Add TLS + cert-manager annotations per deployment.
spec:
  ingressClassName: nginx
  rules:
    - host: harness.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
