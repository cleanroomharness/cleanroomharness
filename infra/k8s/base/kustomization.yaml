apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cleanroom-harness

resources:
  - namespace.yaml
  - api.yaml
  - litellm.yaml
  - postgres.yaml
  - qdrant.yaml
  - redis.yaml

configMapGenerator:
  - name: litellm-config
    files:
      - config.yaml=files/litellm-config.yaml
  - name: postgres-init
    files:
      - files/init.sql
  - name: api-env
    literals:
      - ENVIRONMENT=kubernetes
      - LITELLM_BASE_URL=http://litellm:4000
      - DEFAULT_MODEL=ollama/llama3.2:3b
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - TOOLS_EXECUTION_ENABLED=false
      - OTEL_ENABLED=false

# Dev-only values so the reference stack starts out of the box.
# Real deployments MUST replace this with a proper secret store
# (External Secrets, Sealed Secrets, SOPS, cloud secret manager).
secretGenerator:
  - name: harness-dev-config
    literals:
      - DATABASE_URL=postgresql://cleanroom:cleanroom@postgres:5432/cleanroom
      - POSTGRES_PASSWORD=cleanroom
      - LITELLM_MASTER_KEY=local-dev-only
      - LITELLM_API_KEY=local-dev-only
      - API_AUTH_KEY=

generatorOptions:
  disableNameSuffixHash: true
