services:
  api:
    # Named image so air-gapped hosts can `docker load` the bundle and run
    # `docker compose up --no-build` (see scripts/build_airgap_bundle.sh).
    image: cleanroom-harness-api:0.1.0
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      LITELLM_BASE_URL: http://litellm:4000
      DATABASE_URL: postgresql://cleanroom:cleanroom@postgres:5432/cleanroom
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - litellm
      - postgres
      - qdrant
      - redis

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.66.0-stable
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    volumes:
      - ./infra/litellm/config.yaml:/etc/litellm/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-local-dev-only}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: pgvector/pgvector:0.8.5-pg16
    environment:
      POSTGRES_USER: cleanroom
      POSTGRES_PASSWORD: cleanroom
      POSTGRES_DB: cleanroom
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.18.2
    environment:
      QDRANT__TELEMETRY_DISABLED: "true"
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

  redis:
    image: redis:7.4.9-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  qdrantdata:
